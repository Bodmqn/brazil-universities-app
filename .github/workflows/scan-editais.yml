name: Scan Program Websites for Open Calls
on:
  schedule:
    - cron: '59 23 * * *'
  workflow_dispatch:
    inputs:
      year:
        description: 'Filter year for web search results'
        required: false
        default: '2027'
        type: choice
        options:
          - '2025'
          - '2026'
          - '2027'
          - '2028'

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install requests beautifulsoup4 lxml

      - name: Scan program websites
        run: python scripts/scan-programs.py --year ${{ inputs.year || '2027' }}

      - name: Commit updated data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git
          git add frontend/src/data/ src/assets/data/program-status.json
          git diff --staged --quiet || (git commit -m "bot: update scan results and regenerate frontend data" && git push)
